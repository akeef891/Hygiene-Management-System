<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f5f5f5;
        margin: 0;
      }

      .container {
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        width: 320px;
        text-align: center;
      }

      input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
      }

      button {
        margin-top: 15px;
        width: 100%;
        padding: 10px;
        background: #2c7be5;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover {
        opacity: 0.95;
      }

      /* Toast */
      .toast {
        position: fixed;
        top: 20px;
        right: 20px;
        background: #020617;
        color: white;
        padding: 12px 20px;
        border-radius: 8px;
        border: 1px solid #1e293b;
        opacity: 0;
        transform: translateY(-20px);
        transition: 0.3s;
        z-index: 999;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .toast.success {
        border-left: 4px solid #22c55e;
      }

      .toast.error {
        border-left: 4px solid #ef4444;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Reset Password</h2>

      <form onsubmit="resetPassword(event)">
        <input type="password" id="password" placeholder="New Password" required />
        <button type="submit">Update Password</button>
      </form>
    </div>

    <script>
      function showToast(message, type = "success") {
        const toast = document.getElementById("toast");
        if (!toast) return;

        toast.innerText = message;
        toast.className = "toast show " + type;

        window.clearTimeout(window.__toastTimeout);
        window.__toastTimeout = window.setTimeout(() => {
          toast.className = "toast";
        }, 3000);
      }

      async function resetPassword(event) {
        event.preventDefault();

        const password = document.getElementById("password").value;

        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");

        if (!token || !password) {
          showToast("Token and password are required", "error");
          return;
        }

        try {
          showToast("Loading...", "success");
          const res = await fetch("https://hygiene-management-system.onrender.com/api/auth/reset-password", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              token: token,
              password: password
            })
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.message || "Reset failed");
          }

          showToast("Success", "success");

          window.location.href = "login.html";
        } catch (err) {
        showToast(err.message || "Reset failed", "error");
        }
      }
    </script>

    <div id="toast" class="toast"></div>
  </body>
</html>
